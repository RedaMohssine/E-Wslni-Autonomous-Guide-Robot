# =============================================================================
# Hardware Parameters for Real Robot
# =============================================================================
# Values taken directly from the Arduino motor_controller.ino code.

cmd_vel_to_arduino:
  ros__parameters:
    # Serial connection to Arduino Mega (native USB)
    serial_port: "/dev/ttyACM0"     # Arduino Mega → ttyACM0
    baud_rate: 57600                 # Must match Arduino Serial.begin(57600)

    # Safety watchdog
    cmd_vel_timeout: 0.5            # Seconds before sending M0:0 stop
    publish_rate: 20.0              # Hz for sending M<V>:<W> to Arduino

encoder_odometry:
  ros__parameters:
    # Robot geometry — must match Arduino constants exactly
    # RAYON_ROUE = 0.10 m,  ENTRAXE = 0.488 m
    wheel_separation: 0.488         # ENTRAXE (m) — distance between wheel centres
    wheel_radius: 0.10              # RAYON_ROUE (m)

    # TF frame names
    odom_frame: "odom"
    base_frame: "base_footprint"

    # Timeout: if no /wheel_velocities received in this many seconds,
    # the node stops integrating (robot considered stopped)
    velocity_timeout: 0.5
