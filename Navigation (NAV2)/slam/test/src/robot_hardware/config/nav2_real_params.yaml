# =============================================================================
# Nav2 Parameters — REAL ROBOT (use_sim_time: False)
# =============================================================================
# Adapted from robot_navigation2/config/nav2_params.yaml for real hardware.
# Key differences from simulation:
#   - use_sim_time: False everywhere
#   - Higher AMCL alpha values (real odometry is noisier)
#   - Lower controller frequency (real hardware has more latency)
#   - Tuned velocities for real robot safety
# =============================================================================

amcl:
  ros__parameters:
    use_sim_time: False
    # Odometry noise model — HIGHER than sim because real encoders have slip
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 5.0
    # Match your real LiDAR specs
    laser_max_range: 10.0
    laser_min_range: 0.5
    laser_model_type: "likelihood_field"
    max_beams: 120
    max_particles: 10000
    min_particles: 1000
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    # Higher recovery_alpha_fast makes AMCL inject random particles sooner
    # when its scan-to-map match degrades — this keeps localization alive
    # continuously during navigation without needing manual intervention.
    recovery_alpha_fast: 0.3
    recovery_alpha_slow: 0.001
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.05
    update_min_d: 0.05
    z_hit: 0.7
    z_max: 0.05
    z_rand: 0.25
    z_short: 0.05
    scan_topic: scan
    # Set to true and fill in x/y/yaw if the robot always starts from a known spot.
    # Otherwise keep false and use RViz "2D Pose Estimate" each startup.
    set_initial_pose: false
    # initial_pose:
    #   x: 0.0
    #   y: 0.0
    #   z: 0.0
    #   yaw: 0.0

amcl_map_client:
  ros__parameters:
    use_sim_time: False

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: False

